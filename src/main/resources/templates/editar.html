<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Veículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container mt-5">
    
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <strong>Atualizar Dados do Veículo</strong>
        </div>
        <div class="card-body">
            <form th:action="@{/salvar}" th:object="${veiculoExistente}" method="post">
                
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Marca</label>
                    <input type="text" th:field="*{marca}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Modelo</label>
                    <input type="text" th:field="*{modelo}" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ano</label>
                        <input type="number" th:field="*{ano}" class="form-control" min="1886" max="2027" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Preço</label>
                        <input type="number" step="0.01" th:field="*{preco}" class="form-control" min="0" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Salvar Alterações</button>
                </div>
            </form> 
        </div>
    </div>

</body>
</html>
